<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apexplanet Task 5</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Project Dashboard</h1>
        <section class="validation-section">
            <h2>Validation</h2>
            <input type="text" id="name" placeholder="Enter your name">
            <button onclick="validate()">Validate</button>
            <p id="msg"></p>
        </section>
        
        <section class="api-section">
            <h2>API Data</h2>
            <button onclick="fetchData()">Fetch Posts</button>
            <div id="data-container"></div>
        </section>
        
        <section class="storage-section">
            <h2>Local Storage</h2>
            <input type="text" id="storageInput" placeholder="Enter data to store">
            <button onclick="setUserData()">Save</button>
            <button onclick="getUserData()">Retrieve</button>
            <button onclick="clearUserData()">Clear</button>
            <p id="storage-msg"></p>
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
